<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${lectie.titlu}">Detalii Lecție</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #800020; --bg-light: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .back-link { text-decoration: none; color: var(--main-color); font-weight: 600; margin-bottom: 20px; display: inline-block; }
        h1 { color: #333; border-bottom: 3px solid var(--main-color); padding-bottom: 10px; margin-top: 10px; }
        .content-box { line-height: 1.8; color: #444; background: #fafafa; padding: 25px; border-radius: 8px; margin: 20px 0; white-space: pre-wrap; border: 1px solid #eee; }
        .attachments { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card-download { border: 2px dashed #ddd; padding: 20px; border-radius: 10px; text-align: center; }
        .btn-download { background: var(--main-color); color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; transition: 0.3s; }
        .btn-download:hover { background: #600018; }
        .btn-link { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; transition: 0.3s; }
        .btn-link:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{/admin/cursuri/detalii/{id}(id=${lectie.curs.id})}" class="back-link">← Înapoi la curs</a>
        
        <h1 th:text="${lectie.titlu}">Titlu Lecție</h1>
        <p style="color: #666;">Din cursul: <strong th:text="${lectie.curs.titlu}">Nume Curs</strong></p>

        <h3>📜 Conținut Teoretic</h3>
        <div class="content-box" th:text="${lectie.continut != null ? lectie.continut : 'Această lecție nu are încă un conținut teoretic adăugat.'}">
            Conținutul lecției...
        </div>

        <h3>📎 Materiale Suplimentare</h3>
        <div class="attachments">
            <div th:if="${lectie.numeFisier != null}" class="card-download">
                <i class="fas fa-file-download fa-3x" style="color: var(--main-color);"></i>
                <p><strong th:text="${lectie.numeFisier}">fisier.pdf</strong></p>
                <a th:href="@{/admin/lectii/descarca/{id}(id=${lectie.id})}" class="btn-download">
                    <i class="fas fa-download"></i> Descarcă Fișier
                </a>
            </div>

            <div th:if="${lectie.linkMaterial != null and !#strings.isEmpty(lectie.linkMaterial)}" class="card-download">
                <i class="fas fa-external-link-alt fa-3x" style="color: #007bff;"></i>
                <p>Resursă Externă / Video</p>
                <a th:href="${lectie.linkMaterial}" class="btn-link" target="_blank">
                    <i class="fas fa-play"></i> Deschide Link
                </a>
            </div>

            <p th:if="${lectie.numeFisier == null and (lectie.linkMaterial == null or #strings.isEmpty(lectie.linkMaterial))}" style="color: #999; font-style: italic;">
                Nu există materiale descărcabile pentru această lecție.
            </p>
        </div>
    </div>
</body>
</html>
