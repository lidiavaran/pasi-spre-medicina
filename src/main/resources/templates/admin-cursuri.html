<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Academiei - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #800020; --bg-light: #f4f7f6; --text-dark: #2c3e50; --accent-blue: #3498db; --accent-green: #27ae60; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--main-color); min-height: 100vh; color: white; padding: 25px; box-sizing: border-box; position: fixed; z-index: 100; }
        .sidebar h2 { font-size: 1.5rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .sidebar a { color: white; text-decoration: none; display: block; padding: 12px 15px; transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); padding-left: 20px; }
        .sidebar a.active { background: rgba(255,255,255,0.2); font-weight: 600; }
        
        /* Content Area */
        .content { flex: 1; padding: 40px; margin-left: 260px; box-sizing: border-box; color: var(--text-dark); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        
        /* Forms & Inputs */
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; }
        .btn { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; color: white; }
        .btn-main { background: var(--main-color); }
        .btn-green { background: var(--accent-green); }
        .btn-blue { background: var(--accent-blue); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        /* Course Container */
        .curs-container { border-left: 6px solid var(--main-color); padding: 25px; background: #fff; margin-bottom: 35px; border-radius: 0 15px 15px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* Specific Sections */
        .admin-section-box { margin-top: 15px; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .mentor-box { background: #fdf2f2; border-color: #f5dada; }
        .enroll-box { background: #f0f7ff; border-color: #d6e9ff; }
        
        /* Badges */
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-flex; align-items: center; margin: 3px; color: white; }
        .badge-mentor { background: var(--main-color); }
        .badge-mentor a { color: white; margin-left: 8px; text-decoration: none; font-weight: bold; }
        
        .lectie-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a th:href="@{/admin/utilizatori}"><i class="fas fa-users"></i> Utilizatori</a>
        <a th:href="@{/admin/programari}"><i class="fas fa-calendar-alt"></i> Programări</a>
        <a th:href="@{/admin/orar}"><i class="fas fa-clock"></i> Orar Săptămânal</a>
        <a th:href="@{/admin/cursuri}" class="active"><i class="fas fa-book"></i> Cursuri & Lecții</a>
        <a th:href="@{/login?logout}" style="margin-top: 40px; color: #ff9999;"><i class="fas fa-sign-out-alt"></i> Ieșire</a>
    </div>

    <div class="content">
        <h1><i class="fas fa-graduation-cap"></i> Gestiune Academiei</h1>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Curs Nou</h3>
                <form th:action="@{/admin/cursuri/salveaza}" method="post">
                    <input type="text" name="titlu" placeholder="Titlu Curs" required>
                    <textarea name="descriere" rows="2" placeholder="Descriere..."></textarea>
                    <button type="submit" class="btn btn-main" style="width: 100%;">Creează Curs</button>
                </form>
            </div>

            <div class="card">
                <h3><i class="fas fa-upload"></i> Încarcă Material</h3>
                <form th:action="@{/admin/lectii/salveaza}" method="post" enctype="multipart/form-data">
                    <select name="cursId" required>
                        <option value="">-- Alege cursul --</option>
                        <option th:each="c : ${listaCursuri}" th:value="${c.id}" th:text="${c.titlu}"></option>
                    </select>
                    <input type="text" name="titlu" placeholder="Titlu Lecție" required>
                    <input type="file" name="fisierIncarcat">
                    <button type="submit" class="btn btn-green" style="width: 100%;">Încarcă Lecție</button>
                </form>
            </div>
        </div>

        <h2 style="margin-top: 40px; border-bottom: 2px solid var(--main-color); display: inline-block; padding-bottom: 5px;">
            <i class="fas fa-layer-group"></i> Cursuri Active
        </h2>
        
        <div th:each="c : ${listaCursuri}" class="curs-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 th:text="${c.titlu}" style="margin: 0; color: var(--main-color);"></h2>
                <div>
                    <a th:href="@{/admin/cursuri/detalii/{id}(id=${c.id})}" class="btn btn-blue" style="padding: 8px 15px; font-size: 0.8rem; text-decoration: none;">
                        <i class="fas fa-search"></i> Vezi Curs
                    </a>
                    <a th:href="@{/admin/cursuri/sterge/{id}(id=${c.id})}" 
                       style="color: #e74c3c; margin-left: 20px; text-decoration: none; font-weight: 600;"
                       onclick="return confirm('Ștergi cursul definitiv?')">
                        <i class="fas fa-trash"></i> Șterge
                    </a>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                
                <div class="admin-section-box mentor-box">
                    <strong><i class="fas fa-user-tie"></i> Mentori Asignați:</strong>
                    <div style="margin: 10px 0;">
                        <span th:each="m : ${c.mentori}" class="badge badge-mentor">
                            <span th:text="${m.nume}"></span>
                            <a th:href="@{/admin/cursuri/elimina-mentor/{cursId}/{mentorId}(cursId=${c.id}, mentorId=${m.id})}" 
                               onclick="return confirm('Elimini mentorul?')">&times;</a>
                        </span>
                        <em th:if="${#lists.isEmpty(c.mentori)}" style="color: #999; font-size: 0.8rem;">Niciun mentor.</em>
                    </div>
                    <form th:action="@{/admin/cursuri/asigneaza-mentor}" method="post" style="display: flex; gap: 5px;">
                        <input type="hidden" name="cursId" th:value="${c.id}">
                        <select name="mentorId" required style="padding: 5px; margin: 0;">
                            <option value="">+ Mentor</option>
                            <option th:each="m : ${listaMentori}" th:value="${m.id}" th:text="${m.nume}"></option>
                        </select>
                        <button type="submit" class="btn btn-green" style="padding: 5px 12px;"><i class="fas fa-check"></i></button>
                    </form>
                </div>

                <div class="admin-section-box enroll-box">
                    <strong><i class="fas fa-user-plus"></i> Înscrie Elev Nou:</strong>
                    <div style="margin: 10px 0; font-size: 0.85rem;">
                        <i class="fas fa-users"></i> Total înscriși: <span th:text="${#lists.size(c.elevi)}" style="font-weight: 600;">0</span>
                    </div>
                    <form th:action="@{/admin/cursuri/inscrie-elev}" method="post" style="display: flex; gap: 5px;">
                        <input type="hidden" name="cursId" th:value="${c.id}">
                        <select name="elevId" required style="padding: 5px; margin: 0;">
                            <option value="">+ Elev</option>
                            <option th:each="e : ${listaElevi}" th:value="${e.id}" th:text="${e.nume}"></option>
                        </select>
                        <button type="submit" class="btn btn-blue" style="padding: 5px 12px;"><i class="fas fa-user-check"></i></button>
                    </form>
                </div>

            </div>

            <div style="margin-top: 25px;">
                <h4 style="border-bottom: 1px solid #eee; padding-bottom: 5px;"><i class="fas fa-file-pdf"></i> Materiale de curs:</h4>
				<div th:each="l : ${c.lectii}" class="lectie-item">
				    <span>
				        <i class="far fa-file-alt" style="color: var(--accent-blue); margin-right: 10px;"></i>
				        <a th:href="@{/admin/lectii/detalii/{id}(id=${l.id})}" 
				           th:text="${l.titlu}" 
				           style="text-decoration: none; color: inherit; font-weight: 500;">
				        </a>
				    </span>
				    <a th:href="@{/admin/lectii/sterge/{id}(id=${l.id})}" style="color: #e74c3c;" onclick="return confirm('Ștergi lecția?')">
				        <i class="fas fa-times"></i>
				    </a>
				</div>
                <div th:if="${#lists.isEmpty(c.lectii)}" style="color: #aaa; font-style: italic; font-size: 0.85rem; padding: 10px;">
                    Nu există materiale încărcate.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
