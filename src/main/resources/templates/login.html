<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pași Spre Medicină</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #800020; --accent: #4a0012; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            overflow: hidden;
        }

        /* Fundal decorativ */
        .bg-decoration {
            position: absolute; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1; z-index: 0;
        }

        .login-card {
            background: white; width: 100%; max-width: 400px;
            padding: 50px 40px; border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center; z-index: 1; position: relative;
        }

        .logo-circle {
            width: 80px; height: 80px; background: #fff0f3;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 20px;
            color: var(--primary); font-size: 2rem;
        }

        h2 { margin: 0 0 10px; color: #333; font-weight: 600; }
        p { color: #777; font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group i { position: absolute; left: 15px; top: 42px; color: #aaa; }
        
        label { font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 8px; display: block; padding-left: 5px; }
        
        input {
            width: 100%; padding: 12px 15px 12px 45px;
            border: 2px solid #f0f0f0; border-radius: 12px;
            font-family: inherit; box-sizing: border-box;
            transition: 0.3s; font-size: 0.95rem;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fffcfd; }

        .btn-login {
            width: 100%; background: var(--primary); color: white;
            padding: 14px; border: none; border-radius: 12px;
            font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
            box-shadow: 0 10px 20px rgba(128,0,32,0.2);
        }
        .btn-login:hover { transform: translateY(-2px); background: var(--accent); }

        .error-msg { 
            background: #ffe5e5; color: #d63031; padding: 10px; 
            border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <div class="login-card">
        <div class="logo-circle">
            <i class="fas fa-hand-holding-medical"></i>
        </div>
        <h2>Bine ai revenit</h2>
        <p>Introdu datele pentru a accesa cursurile.</p>

        <div th:if="${param.error}" class="error-msg">
            <i class="fas fa-exclamation-circle"></i> Email sau parolă incorectă!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email sau Utilizator</label>
                <i class="fas fa-envelope"></i>
                <input type="text" name="username" placeholder="exemplu@mail.ro" required>
            </div>

            <div class="form-group">
                <label>Parolă</label>
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Conectare</button>
        </form>
        
        <div style="margin-top: 25px; font-size: 0.8rem; color: #999;">
            Probleme la conectare? Contactează mentorul tău.
        </div>
    </div>
</body>
</html>
