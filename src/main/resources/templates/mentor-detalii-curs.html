<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalii Curs - Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --wine: #800020; 
            --wine-gradient: linear-gradient(135deg, #800020 0%, #4a0012 100%);
            --bg: #f8f9fa; 
            --sidebar-width: 260px;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: row; min-height: 100vh; }
        
        /* --- SIDEBAR --- */
        .sidebar { 
            width: var(--sidebar-width); background: var(--wine-gradient); 
            color: white; padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box;
            transition: all 0.3s ease; z-index: 1000;
        }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .back-link { 
            color: rgba(255,255,255,0.8); text-decoration: none; display: flex; align-items: center; gap: 10px; 
            padding: 12px; border-radius: 10px; transition: 0.3s; background: rgba(255,255,255,0.05);
        }
        .back-link:hover { background: rgba(255,255,255,0.15); color: white; }

        /* --- CONTENT --- */
        .content { flex: 1; margin-left: var(--sidebar-width); padding: 40px; box-sizing: border-box; }
        
        .header-area { margin-bottom: 35px; }
        .header-area h1 { font-size: 1.8rem; color: #2d3436; margin: 0; }
        
        .card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid #edf2f7; 
        }
        
        .card h3 { margin-top: 0; display: flex; align-items: center; gap: 12px; color: #2d3436; font-size: 1.1rem; }

        /* --- LISTA LECTII (File Manager Style) --- */
        .lectie-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; border-radius: 12px; border: 1px solid #f1f3f5;
            margin-bottom: 12px; transition: 0.3s ease; background: #fff;
        }
        .lectie-item:hover { transform: scale(1.01); border-color: var(--wine); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .lectie-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { width: 40px; height: 40px; background: #fff0f3; color: var(--wine); display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1.2rem; }
        
        .badge-file { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; margin-top: 4px; display: inline-block; }

        /* --- FORM STYLING --- */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #4b6584; }
        input[type="text"], input[type="file"] { 
            width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px; 
            box-sizing: border-box; font-family: inherit; transition: 0.3s;
        }
        input:focus { border-color: var(--wine); outline: none; background: #fffcfd; }
        
        .btn-add { 
            background: var(--wine); color: white; border: none; padding: 14px 28px; 
            border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%;
            box-shadow: 0 5px 15px rgba(128,0,32,0.2); transition: 0.3s;
        }
        .btn-add:hover { background: #600018; transform: translateY(-2px); }

        /* --- RESPONSIVITATE (Safari & Mobile) --- */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar h2, .sidebar span { display: none; }
            .content { margin-left: 80px; padding: 25px; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .sidebar h2 { display: block; margin-bottom: 10px; text-align: center; }
            .content { margin-left: 0; padding: 20px; }
            .lectie-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-detalii { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 th:text="${curs.titlu}">Curs</h2>
        <a th:href="@{/mentor/cursuri}" class="back-link">
            <i class="fas fa-chevron-left"></i> <span>Înapoi la cursuri</span>
        </a>
    </div>

    <div class="content">
        <div class="header-area">
            <h1>Administrare Conținut</h1>
            <p style="color: #888;">Adaugă lecții noi sau gestionează materialele existente pentru acest curs.</p>
        </div>

        <div class="card">
            <h3><i class="fas fa-cloud-upload-alt" style="color: var(--wine);"></i> Încarcă Material Nou</h3>
            <form th:action="@{/mentor/lectii/salveaza}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="cursId" th:value="${curs.id}">
                <div class="form-group">
                    <label>Numele Lecției / Materialului</label>
                    <input type="text" name="titlu" placeholder="Ex: Sistemul Circulator - Notițe PDF" required>
                </div>
                <div class="form-group">
                    <label>Alege Fișierul (PDF, Doc, Imagine)</label>
                    <input type="file" name="fisierIncarcat" id="fileInput">
                </div>
                <button type="submit" class="btn-add">
                    <i class="fas fa-save"></i> Salvează Lecția
                </button>
            </form>
        </div>

        <div class="card">
            <h3><i class="fas fa-stream" style="color: var(--wine);"></i> Structura Cursului</h3>
            
            <div th:if="${not #lists.isEmpty(curs.lectii)}" style="margin-top: 20px;">
                <div th:each="l : ${curs.lectii}" class="lectie-item">
                    <div class="lectie-info">
                        <div class="file-icon">
                            <i class="fas" th:classappend="${l.numeFisier != null ? 'fa-file-pdf' : 'fa-play-circle'}"></i>
                        </div>
                        <div>
                            <strong style="display: block; color: #2d3436;" th:text="${l.titlu}">Titlu Lecție</strong>
                            <div th:if="${l.numeFisier != null}" class="badge-file">
                                <i class="fas fa-paperclip"></i> <span th:text="${l.numeFisier}">fisier.pdf</span>
                            </div>
                        </div>
                    </div>
                    <a th:href="@{/mentor/lectii/detalii/{id}(id=${l.id})}" class="btn-detalii" 
                       style="color: var(--wine); text-decoration: none; font-weight: 600; padding: 8px 16px; background: #fff0f3; border-radius: 8px; font-size: 0.85rem; transition: 0.3s;">
                        Detalii <i class="fas fa-arrow-right" style="font-size: 0.7rem; margin-left: 5px;"></i>
                    </a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(curs.lectii)}" style="text-align: center; padding: 40px;">
                <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" style="width: 80px; opacity: 0.2; margin-bottom: 15px;">
                <p style="color: #a4b0be; font-size: 0.95rem;">Nicio lecție încă. Fii primul care adaugă material!</p>
            </div>
        </div>
    </div>

    <script>
        // Mic artificiu pentru Safari - afișăm numele fișierului după selectare
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if(e.target.files[0]) {
                console.log("Fișier selectat: " + e.target.files[0].name);
            }
        });
    </script>
</body>
</html>
