<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalii Lecție - Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --wine: #800020; 
            --wine-light: #fdf2f4;
            --bg: #f8f9fa; 
            --text-dark: #2d3436;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            max-width: 700px; 
            width: 100%;
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Accent decorativ sus */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--wine);
        }

        .btn-back { 
            color: var(--wine); 
            text-decoration: none; 
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            margin-bottom: 30px; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-back:hover { transform: translateX(-5px); }

        .header { 
            border-bottom: 2px solid #f1f3f5; 
            padding-bottom: 25px; 
            margin-bottom: 30px; 
        }
        .header h1 { 
            font-size: 1.8rem; 
            color: var(--text-dark); 
            margin: 0 0 10px 0;
            line-height: 1.2;
        }
        .course-tag {
            display: inline-block;
            background: var(--wine-light);
            color: var(--wine);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .section-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a4b0be;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Material Box */
        .file-box { 
            background: #fafbfc; 
            padding: 40px 20px; 
            border-radius: 20px; 
            border: 2px dashed #edf2f7; 
            text-align: center;
            transition: 0.3s ease;
        }
        .file-box:hover {
            border-color: var(--wine);
            background: #fffcfd;
        }

        .file-icon-wrapper {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            color: var(--wine);
        }

        .file-name {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 5px;
            word-break: break-all;
        }
        .file-meta {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .btn-download { 
            background: var(--wine); 
            color: white; 
            text-decoration: none; 
            padding: 14px 30px; 
            border-radius: 12px; 
            font-weight: 600;
            display: inline-flex; 
            align-items: center; 
            gap: 10px;
            box-shadow: 0 10px 20px rgba(128, 0, 32, 0.2);
            transition: 0.3s;
        }
        .btn-download:hover { 
            background: #600018; 
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(128, 0, 32, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a4b0be;
        }

        /* Safari / Mobile Adjustments */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { padding: 30px 20px; border-radius: 20px; }
            .header h1 { font-size: 1.5rem; }
            .btn-download { width: 100%; justify-content: center; box-sizing: border-box; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a th:href="@{/mentor/cursuri/detalii/{id}(id=${lectie.curs.id})}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Înapoi la curs
        </a>
        
        <div class="header">
            <div class="section-label">Detalii Lecție</div>
            <h1 th:text="${lectie.titlu}">Titlu Lecție</h1>
            <div class="course-tag">
                <i class="fas fa-book-open"></i> <span th:text="${lectie.curs.titlu}">Curs</span>
            </div>
        </div>

        <div class="section-label">Material de studiu</div>

        <div th:if="${lectie.numeFisier != null}" class="file-box">
            <div class="file-icon-wrapper">
                <i class="fas fa-file-pdf fa-2x"></i>
            </div>
            
            <div class="file-name">
                <strong th:text="${lectie.numeFisier}">nume-fisier.pdf</strong>
            </div>
            <div class="file-meta">
                <i class="fas fa-info-circle"></i> Tip fișier: <span th:text="${lectie.tipFisier}">PDF</span>
            </div>
            
            <a th:href="@{/mentor/lectii/download/{id}(id=${lectie.id})}" class="btn-download">
                <i class="fas fa-cloud-download-alt"></i> Descarcă Materialul
            </a>
        </div>

        <div th:unless="${lectie.numeFisier != null}" class="empty-state">
            <i class="fas fa-exclamation-circle fa-3x" style="margin-bottom: 15px; opacity: 0.2;"></i>
            <p>Această lecție nu are materiale atașate încă.</p>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>
</body>
</html>
